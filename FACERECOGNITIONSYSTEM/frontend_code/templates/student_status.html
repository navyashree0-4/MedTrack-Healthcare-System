<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Status</title>

<link rel="stylesheet" href="../static/student_style.css">



</head>
<body>

    <h2>Student Attendance Status</h2>

    <!-- Student Details -->
    <div class="card">
        <p><b>Name:</b> <span id="studentName">Loading...</span></p>
        <p><b>USN:</b> <span id="studentUSN">Loading...</span></p>
        <p><b>Email:</b> <span id="studentEmail">Loading...</span></p>
    </div>

    <!-- Attendance Summary -->
    <h3>Attendance Summary</h3>
    <p><b>Total Classes:</b> <span id="totalClasses">0</span></p>
    <p><b>Classes Attended:</b> <span id="attendedClasses">0</span></p>
    <p><b>Attendance %:</b> <span id="attendancePercent">0%</span></p>

    <!-- Attendance Table -->
    <h3>Attendance Records</h3>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Status</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="attendanceTable">
            <!-- Filled by JS -->
        </tbody>
    </table>

    <a href="homepage.html">Back to Home</a>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
