<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<h2>Book Appointment</h2>

<form method="POST">
<select name="doctor">
{% for d in doctors %}
<option value="{{ d.name }}">{{ d.name }}</option>
{% endfor %}
</select>

<input type="date" name="date" required>

<button type="submit">Book</button>
</form>
